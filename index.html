<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>Rock, Paper, Scissors!</h1>
    </div>

    <div class="content">
        <h2>Make your choice!</h2>
        <h3>First to 5 points wins!</h3>

        <div class="score-text">
            <p>You: <span id="human-score">0</span></p>
            <p>Computer: <span id=computer-score>0</span></p>
        </div>

        <div class="buttons">
            <button id="rock"><img src="imgs/rock-img.png" width="200" height="200"></button>
            <button id="paper"><img src="imgs/paper-img.png" width="200" height="200"></button>
            <button id="scissors"><img src="imgs/scissors-img.png" width="200" height="200"></button>
        </div>
    </div>
</body>
</html>
